name: Create Release Workflow

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version'
        required: true
        default: 'v1.0.0'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create test.txt file
        run: echo "This is a test file for the release" > test.txt

      - name: Create Release with Attachment
        uses: ./
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: Release ${{ github.event.inputs.tag }}
          body: 'Release created automatically with test.txt'
          file_path: ./test.txt
          github_token: ${{ secrets.GITHUB_TOKEN }}
