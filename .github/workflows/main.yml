name: Create Release with Attachment

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release name'
        required: true
        default: 'Test Release'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create test.txt file
        run: |
          echo "This is a test file for the release" > test.txt
          echo "Created by: ingEmmanuelSS" >> test.txt
          echo "Date: $(date)" >> test.txt

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: ${{ github.event.inputs.release_name }}
          body: 'Release created automatically'
          draft: false
          prerelease: false

      - name: Upload test.txt to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./test.txt
          asset_name: test.txt
          asset_content_type: text/plain
